<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Width GIF</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    img {
      width: 100vw;   /* Full viewport width */
      height: auto;   /* Maintain aspect ratio */
      display: block; /* Remove small bottom gap */
    }
  </style>
</head>
<body>
  <img src="gif_file.gif" alt="GIF">
</body>
</html>
